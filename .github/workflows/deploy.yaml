name: Build Push and Auto Release to GHCR

on:
  push:
    branches: [ "development" ]  # 监听 development 分支的推送
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Check out the repository
        with:
          fetch-depth: '0'

      - name: set up jdk
        uses: actions/setup-java@v4.0.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      # 1. 安装并运行 Semantic Release
      # 此步会根据 commit 自动更新 pom.xml、打 Tag 并推回 GitHub
      - name: Run Semantic Release
        id: semantic
        env:
         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install semantic-release @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/changelog @semantic-release/github @semantic-release/git @semantic-release/exec
          npx semantic-release
      # 2. 重新拉取最新的 pom.xml (刚才 Semantic Release  推上去的)
      - name: Pull updated pom.xml
        id: project_version
        run: | 
          git pull origin development
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "APP_VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "当前项目版本号为: $VERSION"
      # 3. 使用新版本构建 Jar 包
      - name: Build with Maven
        run: mvn clean package -Dmaven.test.skip=true
      # 4. 登录 GHCR
      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # 5. 构建并推送 Docker 镜像
      # create cache builder
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      # 使用 Git Tag 作为镜像版本`
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.project_version.outputs.APP_VERSION  }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output Release Info
        run: |
          echo "Successfully released version: ${{ steps.project_version.outputs.APP_VERSION }}"
