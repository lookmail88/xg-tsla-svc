apiVersion: v1
kind: PersistentVolume
metadata:
  name: timescaledb-pv-prod
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  local:
    path: /mnt/data/xuyang.dev/prod
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/os
              operator: In
              values:
                - linux
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: timescaledb-pvc
  namespace: xgao-prod
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: timescaledb-pv-prod
  resources:
    requests:
      storage: 100Gi
