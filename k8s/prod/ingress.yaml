apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xg-tsla-svc-ingress
  namespace: xgao-prod
spec:
  rules:
    - host: api.xuyang.dev
      http:
        paths:
          - path: /xg-tsla-svc
            pathType: Prefix
            backend:
              service:
                name: xg-tsla-svc
                port:
                  number: 8080